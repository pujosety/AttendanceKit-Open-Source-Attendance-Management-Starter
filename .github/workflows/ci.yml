name: AttendanceKit CI

on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: cd mobile && flutter analyze || true

  build-backend:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_DATABASE: attendance_kit
          MYSQL_USER: attendance
          MYSQL_PASSWORD: attendance
          MYSQL_ROOT_PASSWORD: root
        ports: [3306:3306]
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=2s
          --health-timeout=5s
          --health-retries=10
      redis:
        image: redis:7-alpine
        ports: [6379:6379]
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, pcntl, pdo, pdo_mysql, bcmath, gd, zip
      - run: composer --version || echo 'composer missing'
      - run: ls -R backend

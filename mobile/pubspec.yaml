name: attendance_kit
description: AttendanceKit - Clean attendance starter kit.
publish_to: 'none'
version: 0.1.0+1

environment:
    sdk: '>=3.4.0 <4.0.0'

dependencies:
    flutter:
        sdk: flutter
    cupertino_icons: ^1.0.6
    flutter_riverpod: ^2.5.1
    riverpod_annotation: ^2.3.2
    go_router: ^13.0.0
    freezed_annotation: ^2.4.1
    json_annotation: ^4.9.0
    dio: ^5.4.3
    flutter_dotenv: ^5.1.0
    intl: ^0.19.0
    geolocator: ^10.1.0
    image_picker: ^1.1.2
    flutter_local_notifications: ^16.3.0
    connectivity_plus: ^5.0.2
    path_provider: ^2.1.2
    flutter_markdown_web: ^0.3.0
    fluent_ui: ^4.8.18

dev_dependencies:
    flutter_test:
        sdk: flutter
    flutter_lints: ^3.0.0
    riverpod_generator: ^2.4.0
    build_runner: ^2.4.9
    freezed: ^2.5.2
    json_serializable: ^6.8.0

flutter:
    uses-material-design: true
    assets:
        - assets/
        - .env
